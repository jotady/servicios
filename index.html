<style>
:root {
  --purple-vivid: #8B00FF;
  --white: #FAFAFA;
  --gray-mid: #636363;
  --bg: #0E0118;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;cursor:none;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.5;}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.6;}
.cursor-dot{position:fixed;width:8px;height:8px;background:var(--purple-vivid);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 10px rgba(139,0,255,0.8);transition:width .15s,height .15s,background .15s;}
.cursor-ring{position:fixed;width:36px;height:36px;border:1.5px solid rgba(139,0,255,0.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .3s;}
.cursor-dot.hov{width:5px;height:5px;background:white;}
.cursor-ring.hov{width:54px;height:54px;border-color:rgba(139,0,255,0.9);}


/* SCENE вҖ” wrapper para tilt 3D */
.scene{position:relative;z-index:1;transform-style:preserve-3d;will-change:transform;}

/* STAGE */
.stage{display:flex;flex-direction:column;align-items:center;text-align:center;gap:0;transform-style:preserve-3d;}

/* LOGO */
.logo-mark{width:72px;height:72px;margin-bottom:32px;opacity:0;animation:fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;filter:drop-shadow(0 0 24px rgba(139,0,255,0.5));display:block;}

/* TITLE */
.title-wrap{position:relative;margin-bottom:8px;opacity:0;animation:fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;}
.title-svg{width:min(580px,90vw);overflow:visible;filter:url(#distortFilter);}
.title-text{font-family:'Encode Sans',sans-serif;font-size:96px;font-weight:800;fill:var(--white);letter-spacing:-2px;font-variation-settings:'wdth' 125,'wght' 800;}
.title-text-stroke{font-family:'Encode Sans',sans-serif;font-size:96px;font-weight:800;fill:none;stroke:rgba(139,0,255,0.6);stroke-width:1;letter-spacing:-2px;font-variation-settings:'wdth' 125,'wght' 800;}

/* TAGLINE */
.tagline{font-size:13px;font-weight:400;letter-spacing:0.25em;text-transform:uppercase;color:var(--gray-mid);margin-bottom:56px;opacity:0;animation:fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.7s forwards;}

/* NAV */
.nav-buttons{display:flex;flex-direction:column;align-items:center;gap:12px;opacity:0;animation:fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;}
.nav-row{display:flex;gap:12px;align-items:center;}
.nav-btn{display:flex;align-items:center;gap:10px;padding:15px 28px;border-radius:99px;font-family:'Encode Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;cursor:none;transition:box-shadow .25s,background .25s,border-color .25s,color .25s;position:relative;will-change:transform;font-variation-settings:'wdth' 110,'wght' 700;}
.nav-btn-primary{background:var(--purple-vivid);color:white;border:1.5px solid var(--purple-vivid);box-shadow:0 0 32px rgba(139,0,255,0.4);}
.nav-btn-primary:hover{box-shadow:0 0 52px rgba(139,0,255,0.7);background:#9f1fff;}
.nav-btn-secondary{background:transparent;color:rgba(255,255,255,0.6);border:1.5px solid rgba(255,255,255,0.12);}
.nav-btn-secondary:hover{border-color:rgba(139,0,255,0.5);color:var(--white);background:rgba(139,0,255,0.08);}
.nav-btn-behance{display:inline-flex;align-items:center;gap:7px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--gray-mid);text-decoration:none;cursor:none;padding:9px 18px;border-radius:99px;border:1px solid rgba(255,255,255,0.07);transition:color .2s,border-color .2s,background .2s;will-change:transform;}
.nav-btn-behance:hover{color:rgba(255,255,255,0.7);border-color:rgba(255,255,255,0.18);background:rgba(255,255,255,0.04);}

/* EASTER EGG TRIGGER вҖ” izquierda inferior */
.egg-trigger{position:fixed;bottom:28px;left:32px;display:flex;flex-direction:column;align-items:center;gap:6px;z-index:10;cursor:none;opacity:0;animation:fadeUp 1s cubic-bezier(0.16,1,0.3,1) 1.4s forwards;}
.egg-btn{background:none;border:none;cursor:none;display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px;}
.egg-warning{animation:eggWiggle 3.5s ease-in-out infinite;}
@keyframes eggWiggle{0%,88%,100%{transform:rotate(0deg);}90%{transform:rotate(-5deg);}92%{transform:rotate(5deg);}94%{transform:rotate(-3deg);}96%{transform:rotate(3deg);}98%{transform:rotate(-1deg);}}
.egg-label{font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,80,80,0.6);animation:eggPulse 2s ease-in-out infinite;}
@keyframes eggPulse{0%,100%{opacity:0.4;}50%{opacity:1;}}

/* SOCIAL вҖ” derecha inferior */
.social-row{position:fixed;bottom:32px;right:40px;display:flex;gap:12px;align-items:center;opacity:0;animation:fadeUp 1s cubic-bezier(0.16,1,0.3,1) 1.2s forwards;z-index:1;}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
svg.filter-defs{position:absolute;width:0;height:0;}

/* в”Җв”Җ RESPONSIVE MГ“VIL в”Җв”Җ */
@media (max-width: 600px) {

<script>
// в”Җв”Җ CURSOR в”Җв”Җ
const dot=document.getElementById('cursorDot'),ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
(function ar(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(ar);})();
document.querySelectorAll('a,button').forEach(el=>{
  el.addEventListener('mouseenter',()=>{dot.classList.add('hov');ring.classList.add('hov');});
  el.addEventListener('mouseleave',()=>{dot.classList.remove('hov');ring.classList.remove('hov');});
});

// в”Җв”Җ DISTORSIГ“N SVG в”Җв”Җ
const turbulence=document.getElementById('turbulence');
let currentScale=0,targetScale=0,distortActive=true;
document.addEventListener('mousemove',e=>{
  if(!distortActive)return;
  const dx=(e.clientX-window.innerWidth/2)/(window.innerWidth/2);
  const dy=(e.clientY-window.innerHeight/2)/(window.innerHeight/2);
  targetScale=Math.sqrt(dx*dx+dy*dy)*28;
  turbulence.setAttribute('baseFrequency',`${0.012+Math.abs(dx)*.008} ${0.012*.8}`);
});
(function ad(){currentScale+=(targetScale-currentScale)*.06;const d=turbulence.nextElementSibling;if(d)d.setAttribute('scale',currentScale.toFixed(2));requestAnimationFrame(ad);})();
let seed=0;
setInterval(()=>{if(distortActive){seed=(seed+1)%100;turbulence.setAttribute('seed',seed);}},120);

// в”Җв”Җ SCENE TILT в”Җв”Җ
const scene=document.getElementById('scene');
let tiltActive=true,tiltX=0,tiltY=0,targetTX=0,targetTY=0;
document.addEventListener('mousemove',e=>{
  if(!tiltActive)return;
  const dx=(e.clientX-window.innerWidth/2)/(window.innerWidth/2);
  const dy=(e.clientY-window.innerHeight/2)/(window.innerHeight/2);

});
(function at(){tiltX+=(targetTX-tiltX)*.07;tiltY+=(targetTY-tiltY)*.07;scene.style.transform=`perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;requestAnimationFrame(at);})();

// в”Җв”Җ PAGE TRANSITION вҖ” VГ“RTICE в”Җв”Җ
let vortexRunning=false;

function vortexOut(url, originX, originY){
  if(vortexRunning) return;
  vortexRunning=true;

  // Limpiar cualquier canvas residual antes de crear uno nuevo
  document.querySelectorAll('canvas.vortex-canvas').forEach(c=>c.remove());

  const vc=document.createElement('canvas');
  vc.className='vortex-canvas';
  vc.style.cssText='position:fixed;inset:0;z-index:7000;pointer-events:all;';
  vc.width=window.innerWidth; vc.height=window.innerHeight;
  document.body.appendChild(vc);
  const ctx=vc.getContext('2d');

  const W=vc.width, H=vc.height;
  const ox = originX || W/2;
  const oy = originY || H/2;
  const maxR=Math.sqrt(Math.max(ox,W-ox)**2+Math.max(oy,H-oy)**2)*1.1;
  let r=0, frame=0;
  const DURATION=55;

  function draw(){
    frame++;
    const progress=frame/DURATION;
    const eased=1-Math.pow(1-progress,3);
    r=eased*maxR;

    ctx.clearRect(0,0,W,H);
    ctx.beginPath();
    ctx.arc(ox,oy,r,0,Math.PI*2);
    ctx.fillStyle='#0E0118';
    ctx.fill();

    if(progress<0.85){
      const lineCount=28;
      const lineProgress=progress/0.85;
      for(let i=0;i<lineCount;i++){
        const angle=(i/lineCount)*Math.PI*2;
        const innerR=r*0.15, outerR=r*(0.4+Math.random()*0.5);
        const alpha=(1-lineProgress)*0.5;
        const lx1=ox+Math.cos(angle)*innerR, ly1=oy+Math.sin(angle)*innerR;
        const lx2=ox+Math.cos(angle)*outerR, ly2=oy+Math.sin(angle)*outerR;
        const grad=ctx.createLinearGradient(lx1,ly1,lx2,ly2);
        grad.addColorStop(0,`rgba(139,0,255,${alpha*0.9})`);
        grad.addColorStop(0.5,`rgba(200,100,255,${alpha*0.6})`);
        grad.addColorStop(1,'rgba(139,0,255,0)');
        ctx.beginPath(); ctx.moveTo(lx1,ly1); ctx.lineTo(lx2,ly2);
        ctx.strokeStyle=grad; ctx.lineWidth=0.8+Math.random()*1.5; ctx.stroke();
      }
      ctx.beginPath(); ctx.arc(ox,oy,r,0,Math.PI*2);
      ctx.strokeStyle=`rgba(139,0,255,${(1-lineProgress)*0.7})`;
      ctx.lineWidth=2; ctx.stroke();
      const glow=ctx.createRadialGradient(ox,oy,0,ox,oy,r*0.2);
      glow.addColorStop(0,`rgba(180,0,255,${(1-lineProgress)*0.4})`);
      glow.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(ox,oy,r*0.2,0,Math.PI*2);
      ctx.fillStyle=glow; ctx.fill();
    }

    if(frame<DURATION) requestAnimationFrame(draw);
    else setTimeout(()=>window.location.href=url, 50);
  }
  requestAnimationFrame(draw);
}

// Capturar posiciГіn del clic en cada botГіn
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',e=>{
    e.preventDefault();
    const r=btn.getBoundingClientRect();
    vortexOut(btn.href, r.left+r.width/2, r.top+r.height/2);
  });
});

// Entrada вҖ” vГіrtice de apertura al cargar la pГЎgina
window.addEventListener('load',()=>{
  // Asegurar que el flag estГ© limpio al entrar
  vortexRunning=false;

  // Limpiar canvas residuales
  document.querySelectorAll('canvas.vortex-canvas').forEach(c=>c.remove());

  const vc=document.createElement('canvas');
  vc.className='vortex-canvas';
  vc.style.cssText='position:fixed;inset:0;z-index:7000;pointer-events:none;';
  vc.width=window.innerWidth; vc.height=window.innerHeight;
  document.body.appendChild(vc);
  const ctx=vc.getContext('2d');
  const W=vc.width, H=vc.height, cx=W/2, cy=H/2;
  const maxR=Math.sqrt((W/2)**2+(H/2)**2)*1.1;
  let frame=0;
  const DUR=48;

  (function drawIn(){
    frame++;
    const p=frame/DUR, e=Math.pow(p,0.55);
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#0E0118'; ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation='destination-out';
    ctx.beginPath(); ctx.arc(cx,cy,maxR*e,0,Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation='source-over';
    if(maxR*e>5){
      ctx.beginPath(); ctx.arc(cx,cy,maxR*e,0,Math.PI*2);
      ctx.strokeStyle=`rgba(139,0,255,${0.55*(1-p)})`; ctx.lineWidth=3; ctx.stroke();
    }
    if(frame<DUR){
      requestAnimationFrame(drawIn);
    } else {
      ctx.clearRect(0,0,W,H);
      vc.remove(); // Eliminar completamente del DOM
    }
  })();
});

// в”Җв”Җ EASTER EGG в”Җв”Җ
let eggRunning=false;

function triggerEasterEgg(){
  if(eggRunning)return;
  eggRunning=true;
  const trigger=document.getElementById('eggTrigger');
  trigger.style.transition='opacity .3s';
  trigger.style.opacity='0';
  trigger.style.pointerEvents='none';
  runExplosion();
}

function runExplosion(){
  const titleSvg=document.getElementById('titleSvg');

  // Canvas temporal вҖ” se crea y destruye solo para este easter egg
  const expCanvas=document.createElement('canvas');
  expCanvas.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:500;';
  expCanvas.width=window.innerWidth;
  expCanvas.height=window.innerHeight;
  document.body.appendChild(expCanvas);
  const ctx=expCanvas.getContext('2d');

  // Pausar tilt y distorsiГіn
  tiltActive=false;
  distortActive=false;
  scene.style.transition='transform .3s ease';
  scene.style.transform='perspective(1000px) rotateX(0) rotateY(0)';

  // Fase 1 вҖ” sacudida + distorsiГіn creciente (500ms)
  let shakeF=0;
  const shakeInt=setInterval(()=>{
    shakeF++;
    const intensity=Math.min(shakeF*2,55);
    const d=turbulence.nextElementSibling;
    if(d)d.setAttribute('scale',(intensity+Math.random()*25).toFixed(1));
    turbulence.setAttribute('baseFrequency',`${0.02+Math.random()*.035} ${0.015+Math.random()*.025}`);
    turbulence.setAttribute('seed',Math.floor(Math.random()*100));
    titleSvg.style.transform=`translate(${(Math.random()-.5)*10}px,${(Math.random()-.5)*8}px)`;
  },28);

  // Fase 2 вҖ” explosiГіn (a los 550ms)
  setTimeout(()=>{
    clearInterval(shakeInt);
    titleSvg.style.opacity='0';
    titleSvg.style.transform='';

    const rect=titleSvg.getBoundingClientRect();
    const cx=rect.left+rect.width/2;
    const cy=rect.top+rect.height/2;

    // Flash inicial
    ctx.fillStyle='rgba(139,0,255,0.35)';
    ctx.fillRect(0,0,expCanvas.width,expCanvas.height);
    setTimeout(()=>ctx.clearRect(0,0,expCanvas.width,expCanvas.height),80);

    // Crear partГӯculas
    const letters='JOTADY'.split('');
    const particles=[];
    const TOTAL=65;

    for(let i=0;i<TOTAL;i++){
      const angle=Math.random()*Math.PI*2;
      const speed=5+Math.random()*16;
      const isLetter=i<letters.length*4;
      particles.push({
        x:cx+(Math.random()-.5)*60,
        y:cy+(Math.random()-.5)*30,
        vx:Math.cos(angle)*speed,
        vy:Math.sin(angle)*speed-(Math.random()*3),
        gravity:0.15+Math.random()*.18,
        life:1,
        decay:0.01+Math.random()*.007,
        size:isLetter?10+Math.random()*24:1.5+Math.random()*5,
        char:isLetter?letters[i%letters.length]:null,
        color:['#8B00FF','#CF88FF','#ffffff','#5500CC'][Math.floor(Math.random()*4)],
        rot:Math.random()*Math.PI*2,
        rotSpd:(Math.random()-.5)*.22,
        bounced:false,
      });
    }

    let frame=0;
    const MAX_FRAMES=180;

    function drawFrame(){
      ctx.clearRect(0,0,expCanvas.width,expCanvas.height);
      frame++;
      let alive=false;

      // AtracciГіn magnГ©tica despuГ©s del frame 110
      const pullStr=frame>110?(frame-110)*.028:0;

      particles.forEach(p=>{
        if(p.life<=0)return;
        alive=true;
        p.vy+=p.gravity;
        if(pullStr>0){
          p.vx+=(cx-p.x)*pullStr*.04;
          p.vy+=(cy-p.y)*pullStr*.04;
          p.vx*=0.91; p.vy*=0.91;
        }
        p.x+=p.vx; p.y+=p.vy;
        p.rot+=p.rotSpd;
        p.life-=p.decay;
        if(p.y>expCanvas.height-10&&!p.bounced){p.vy*=-.45;p.vx*=.65;p.bounced=true;}
        if(p.x<0||p.x>expCanvas.width)p.vx*=-.55;

        ctx.save();
        ctx.globalAlpha=Math.max(0,p.life);
        ctx.translate(p.x,p.y);
        ctx.rotate(p.rot);
        if(p.char){
          ctx.font=`bold ${p.size}px 'Encode Sans',sans-serif`;
          ctx.fillStyle=p.color;
          ctx.shadowColor=p.color;
          ctx.shadowBlur=14;
          ctx.fillText(p.char,0,0);
        } else {
          ctx.beginPath();
          ctx.arc(0,0,p.size,0,Math.PI*2);
          ctx.fillStyle=p.color;
          ctx.shadowColor=p.color;
          ctx.shadowBlur=8;
          ctx.fill();
        }
        ctx.restore();
      });

      if(frame<MAX_FRAMES&&alive){
        requestAnimationFrame(drawFrame);
      } else {
        finishExplosion(expCanvas,ctx,titleSvg);
      }
    }
    requestAnimationFrame(drawFrame);
  },550);
}

function finishExplosion(expCanvas,ctx,titleSvg){
  ctx.clearRect(0,0,expCanvas.width,expCanvas.height);

  // Flash final morado
  ctx.fillStyle='rgba(139,0,255,0.5)';
  ctx.fillRect(0,0,expCanvas.width,expCanvas.height);

  setTimeout(()=>{
    ctx.clearRect(0,0,expCanvas.width,expCanvas.height);
    expCanvas.remove(); // Eliminar completamente del DOM

    // Reensamblar con glitch decreciente
    const d=turbulence.nextElementSibling;
    if(d)d.setAttribute('scale','70');
    turbulence.setAttribute('baseFrequency','0.06 0.05');
    titleSvg.style.opacity='1';

    let rs=70;
    const rAnim=setInterval(()=>{
      rs=Math.max(0,rs-3.5);
      if(d)d.setAttribute('scale',rs.toFixed(1));
      if(rs<=0){
        clearInterval(rAnim);
        // Restaurar todo
        distortActive=true;
        tiltActive=true;
        eggRunning=false;
        // Reaparece el trigger tras 1.5s
        setTimeout(()=>{
          const t=document.getElementById('eggTrigger');
          t.style.transition='opacity .7s ease';
          t.style.opacity='1';
          t.style.pointerEvents='all';
        },1500);
      }
    },22);
  },220);
}

// в”Җв”Җ PARTГҚCULAS в”Җв”Җ
(function(){
  const canvas=document.getElementById('bgCanvas'),ctx=canvas.getContext('2d');
  let W,H,pts=[];
  const N=90,RAD=130;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  window.addEventListener('resize',resize);resize();
  let pmx=-9999,pmy=-9999;
  document.addEventListener('mousemove',e=>{pmx=e.clientX;pmy=e.clientY;});
  class Pt{
    constructor(){this.reset(true);}
    reset(init){
      this.x=Math.random()*W;this.y=init?Math.random()*H:H+10;
      this.vx=(Math.random()-.5)*.35;this.vy=-(Math.random()*.45+.1);
      this.r=Math.random()*1.6+.3;
      this.op=Math.random()*.5+.1;this.opDir=Math.random()>.5?1:-1;
      this.col=Math.random()>.4?`rgba(${100+Math.floor(Math.random()*60)},0,255,`:`rgba(200,180,255,`;
    }
    update(){
      this.x+=this.vx;this.y+=this.vy;this.op+=.003*this.opDir;
      if(this.op>.6||this.op<.05)this.opDir*=-1;
      const dx=this.x-pmx,dy=this.y-pmy,d=Math.sqrt(dx*dx+dy*dy);
      if(d<RAD){const f=(RAD-d)/RAD,a=Math.atan2(dy,dx);this.x+=Math.cos(a)*f*RAD*.02*60;this.y+=Math.sin(a)*f*RAD*.02*60;}
      if(this.y<-10||this.x<-10||this.x>W+10)this.reset();
    }
    draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`${this.col}${this.op})`;ctx.fill();}
  }
  for(let i=0;i<N;i++)pts.push(new Pt());
  (function loop(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<90){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(139,0,255,${(1-d/90)*.12})`;ctx.lineWidth=.5;ctx.stroke();}
    }
    pts.forEach(p=>{p.update();p.draw();});
    requestAnimationFrame(loop);
  })();
})();
</script>
